
services:
  postgres:
    image: postgres:15-alpine
    container_name: football_bot_db
    environment:
      POSTGRES_USER: bot_user
      POSTGRES_PASSWORD: bot_password
      POSTGRES_DB: football_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot_user -d football_bot"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bot_network

  # Опционально: pgAdmin для визуального управления БД
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: football_bot_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge

volumes:
  postgres_data: